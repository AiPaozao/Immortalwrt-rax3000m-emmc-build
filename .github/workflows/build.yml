name: Build ImmortalWrt 24.10.6 - RAX3000M eMMC

on:
  workflow_dispatch:
  push:
分支:
      - main

permissions:
  contents: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: config/rax3000m-emmc.config
  DIY_SCRIPT: scripts/diy.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    name: Build for cmcc_rax3000m-emmc

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /opt/ghc /usr/share/dotnet /usr/local/lib/android /usr/local/share/powershell
          sudo apt-get clean
          df -h

      - name: Setup build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get full-upgrade -y
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk \
            gettext git gperf haveged help2man intltool jq lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libncurses5-dev libncursesw5-dev \
            libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full \
            patch pkgconf python3 python3-pyelftools python3-pip qemu-utils re2c rsync scons \
            squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: Clone ImmortalWrt source [openwrt-24.10]
        run: |
          git clone --depth=1 -b $REPO_BRANCH $REPO_URL immwrt
          cd immwrt
          echo "=== Source info ==="
          git log -1 --format='%H %s%nAuthor: %an <%ae>%nDate: %ai'

      - name: Generate .config from seed
        run: |
          cd immwrt
          cp ../${{ env.CONFIG_FILE }} .config
          echo "=== Merging config ==="
          make defconfig V=s
          echo "=== Diffconfig (what's actually selected) ==="
          ./scripts/diffconfig.sh || true

      - name: Run DIY script (patch defaults, feeds, etc.)
        run: |
          chmod +x ${{ env.DIY_SCRIPT }}
          cd immwrt
          bash ../${{ env.DIY_SCRIPT }}

      - name: Update & Install feeds
        run: |
          cd immwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Finalize config after feeds
        run: |
          cd immwrt
          make defconfig V=s

      - name: Download package sources (dl cache)
        run: |
          cd immwrt
          make download -j$(nproc) V=s || true
          find dl -size -1024c -exec ls -l {} \; 2>/dev/null | head -20

      - name: Build firmware
        run: |
          cd immwrt
          echo "=== Start building ==="
          make -j$(nproc) V=s 2>&1 | tee build.log
          echo "=== Build done ==="
          ls -lh bin/targets/mediatek/filogic/

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          cp bin/targets/mediatek/filogic/*squashfs-sysupgrade* artifacts/ 2>/dev/null || true
          cp bin/targets/mediatek/filogic/*initramfs-recovery* artifacts/ 2>/dev/null || true
          cp bin/targets/mediatek/filogic/*preloader* artifacts/ 2>/dev/null || true
          cp bin/targets/mediatek/filogic/*fip* artifacts/ 2>/dev/null || true
          cp bin/targets/mediatek/filogic/*gpt* artifacts/ 2>/dev/null || true
          ls -lh artifacts/
          echo "No sysupgrade?" >> artifacts/README.txt
          cat build.log | tail -100 > artifacts/build_tail.txt

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rax3000m-emmc-24.10.6-${{ github.run_number }}
          name: ImmortalWrt 24.10.6 · RAX3000M eMMC · Build ${{ github.run_number }}
          body: |
            ## ImmortalWrt 24.10.6 — CMCC RAX3000M eMMC

            - **Branch**: openwrt-24.10
            - **Target**: mediatek/filogic
            - **Device**: cmcc_rax3000m-emmc
            - **Default LAN IP**: 192.168.10.1
            - **Build Date**: ${{ github.run_attempt }}

            ### 刷机文件
            - `*-squashfs-sysupgrade.itb` → **主升级文件**（进已有系统后刷，或 U-Boot Web 刷）
            - `*-initramfs-recovery.itb` → 救砖/首次刷入用
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
