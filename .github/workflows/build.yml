name: Build ImmortalWrt 24.10.6 - RAX3000M eMMC

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: config/rax3000m-emmc.config
  DIY_SCRIPT: scripts/diy.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    name: Build for cmcc_rax3000m-emmc

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false
          # Force LF line endings
          line-ending: 'lf'

      - name: Free disk space
        run: |
          sudo rm -rf /opt/ghc /usr/share/dotnet /usr/local/lib/android /usr/local/share/powershell
          sudo apt-get clean
          df -h

      - name: Setup build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get full-upgrade -y
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk \
            gettext git gperf haveged help2man intltool jq lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libncurses5-dev libncursesw5-dev \
            libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full \
            patch pkgconf python3 python3-pyelftools python3-pip qemu-utils re2c rsync scons \
            squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: Clone ImmortalWrt source [openwrt-24.10]
        run: |
          git clone --depth=1 -b $REPO_BRANCH $REPO_URL immwrt
          cd immwrt
          echo "=== Source info ==="
          git log -1 --format='%H %s%nAuthor: %an <%ae>%nDate: %ai'

      - name: Generate .config from seed
        run: |
          cd immwrt
          cp ../${{ env.CONFIG_FILE }} .config
          echo "=== Merging config ==="
          make defconfig V=s
          echo "=== Diffconfig (what's actually selected) ==="
          ./scripts/diffconfig.sh || true

      - name: Run DIY script (patch defaults, feeds, etc.)
        run: |
          # Ensure LF line endings for the script
          sed -i 's/\r$//' ${{ env.DIY_SCRIPT }}
          chmod +x ${{ env.DIY_SCRIPT }}
          cd immwrt
          bash ../${{ env.DIY_SCRIPT }}

      - name: Debug - Show feeds.conf.default content
        run: |
          cd immwrt
          echo "=== feeds.conf.default content ==="
          cat -A feeds.conf.default
          echo "=== End of feeds.conf.default ==="

      - name: Update & Install feeds
        run: |
          cd immwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Finalize config after feeds
        run: |
          cd immwrt
          echo "=== Applying config file again after feeds update ==="
          cp ../${{ env.CONFIG_FILE }} .config
          make defconfig V=s
          echo "=== Final diffconfig ==="
          ./scripts/diffconfig.sh || true

      - name: Download package sources (dl cache)
        run: |
          cd immwrt
          make download -j$(nproc) V=s || true
          find dl -size -1024c -exec ls -l {} \; 2>/dev/null | head -20

      - name: Build firmware
        run: |
          cd immwrt
          echo "=== Start building ==="
          make -j$(nproc) V=s 2>&1 | tee build.log
          EXIT_CODE=$?
          echo "=== Build finished with exit code: $EXIT_CODE ==="
          ls -la bin/targets/mediatek/filogic/
          ls -la bin/targets/mediatek/filogic/packages/ 2>/dev/null || true
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Build failed! Last 200 lines of build log:"
            tail -200 build.log
            exit $EXIT_CODE
          fi

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          cd immwrt
          
          echo "=== Available files in target directory ==="
          ls -la bin/targets/mediatek/filogic/
          
          echo "=== Copying firmware files ==="
          for file in bin/targets/mediatek/filogic/*.itb bin/targets/mediatek/filogic/*.bin; do
            if [ -f "$file" ]; then
              echo "Copying: $file"
              cp "$file" ../artifacts/
            fi
          done
          
          for file in bin/targets/mediatek/filogic/*preloader* bin/targets/mediatek/filogic/*fip* bin/targets/mediatek/filogic/*gpt*; do
            if [ -f "$file" ]; then
              echo "Copying: $file"
              cp "$file" ../artifacts/
            fi
          done
          
          cd ..
          echo "=== Artifacts directory contents ==="
          ls -lh artifacts/
          
          if [ -f immwrt/build.log ]; then
            cp immwrt/build.log artifacts/
          fi
          
          if [ ! "$(ls -A artifacts/)" ]; then
            echo "ERROR: Build produced no artifacts!"
            exit 1
          fi

      - name: Prepare files for release (filter out empty files)
        run: |
          mkdir -p release
          for f in artifacts/*; do
            if [ -f "$f" ] && [ -s "$f" ]; then
              echo "Copying to release: $f"
              cp "$f" release/
            fi
          done
          echo "=== Release files ==="
          ls -lh release/
          
          if [ ! "$(ls -A release/)" ]; then
            echo "ERROR: No files to release!"
            exit 1
          fi
      
      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rax3000m-emmc-24.10.6-${{ github.run_number }}
          name: ImmortalWrt 24.10.6 · RAX3000M eMMC · Build ${{ github.run_number }}
          body: |
            ## ImmortalWrt 24.10.6 — CMCC RAX3000M eMMC

            - **Branch**: openwrt-24.10
            - **Target**: mediatek/filogic
            - **Device**: cmcc_rax3000m-emmc
            - **Default LAN IP**: 192.168.10.1
            - **Build Date**: ${{ github.run_attempt }}

            ### 刷机文件
            - `*-squashfs-sysupgrade.itb` → **主升级文件**（进已有系统后刷，或 U-Boot Web 刷）
            - `*-initramfs-recovery.itb` → 救砖/首次刷入用
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
